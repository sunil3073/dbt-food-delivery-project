sources:
    - name: raw
      database: FOOD_DELIVERY_DEV
      schema: raw
      tables:
        - name: CUSTOMERS
          description: Raw customer data loaded from s3 into snowflake
          loaded_at_field: SIGNUP_DATE
          freshness:
             warn_after: {count: 48, period: hour}
             error_after: {count: 72, period: hour}
        - name: RESTAURANTS
          description: Raw RESTAURANTS data loaded from s3 into snowflake
          # No loaded_at/timestamp column available in source — freshness check not possible until ingestion adds one

        - name: orders
          description: Raw orders data loaded from s3 into snowflake
          loaded_at_field: order_time
          freshness: 
            warn_after: {count: 6 ,period: hour}
            error_after: {count: 24 ,period: hour}
        - name: delivery
          description: Raw delivery data loaded from s3 into snowflake
          # No loaded_at/timestamp column available in source — freshness check not possible until ingestion adds one

        - name: order_items
          description: Raw orders_items data loaded from s3 into snowflake
          # No loaded_at/timestamp column available in source — freshness check not possible until ingestion adds one

