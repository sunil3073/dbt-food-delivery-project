version: 2

models:
  - name: mart_daily_business_kpis
    columns:
      - name: order_date
        description: Date on which the customer order was placed.
        tests: [not_null, unique]
      - name: total_orders
        description: Total number of orders placed on the given date.
        tests: [not_null]
      - name: gross_revenue
        description: Total revenue generated from all orders before any adjustments or discounts.
        tests: [not_null]
      - name: total_customers
        description: Total number of unique customers who placed orders on the given date.
      - name: total_restaurants
        description: Total number of unique restaurants that received orders on the given date.
      - name: avg_order_value
        description: Average monetary value of orders placed on the given date.
      - name: total_items_sold
        description: Total quantity of items sold across all orders on the given date.    
    description: This model is belongs to the Arjun Sharma
    config:
      meta: 
        owner: Arjun Sharma
        team: Analytics
        refresh_frequency: daily         
    
  - name: dim_customer
    description: Dimension table containing customer details
    columns:
      - name: customer_id
        description: this is a customer_id col
        tests: [not_null, unique]

  - name: dim_restaurants
    description: Dimension table containing restaurant details
    columns:
      - name: restaurant_id
        tests: [not_null, unique]

  - name: fct_orders
    description: Fact table containing order level metrics
    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

      - name: restaurant_id
        tests:
          - relationships:
              to: ref('dim_restaurants')
              field: restaurant_id
      - name: total_amount 
        description: this is a total_amount col
        tests: 
          - assert_positive_value          

  - name: fct_delivery
    description: Fact table containing delivery performance metrics
    columns:
      - name: order_id
        tests: [not_null]

  - name: dim_customer_scd
    description: This scd type2 used to maintain the historical customer data
    columns: 
      - name: scd_id 
        tests: [ not_null, unique] 
      - name: customer_id
        tests: [not_null]
      - name: date_start
        tests: 
           - not_null
      - name: status_flag
        tests:
          - not_null
          - accepted_values:
               values: ['active', 'inactive']
                
       

