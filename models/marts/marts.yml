version: 2

models:
  - name: mart_daily_business_kpis
    columns:
      - name: order_date
        description: this is a order_date col
        tests: [not_null, unique]
      - name: total_orders
        description: this is a total_orders col
        tests: [not_null]
      - name: gross_revenue
        description: this is a gross_revenue col
        tests: [not_null]  
    description: This model is belongs to the Arjun Sharma
    config:
      meta: 
        owner: Arjun Sharma
        team: Analytics
        refresh_frequency: daily         
    
  - name: dim_customer
    description: Dimension table containing customer details
    columns:
      - name: customer_id
        description: this is a customer_id col
        tests: [not_null, unique]

  - name: dim_restaurants
    description: Dimension table containing restaurant details
    columns:
      - name: restaurant_id
        tests: [not_null, unique]

  - name: fct_orders
    description: Fact table containing order level metrics
    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

      - name: restaurant_id
        tests:
          - relationships:
              to: ref('dim_restaurants')
              field: restaurant_id
      - name: total_amount 
        tests: 
          - assert_positive_value          

  - name: fct_delivery
    description: Fact table containing delivery performance metrics
    columns:
      - name: order_id
        tests: [not_null]

       

